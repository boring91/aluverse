# Local dev infrastructure for AluVerse.
# Brought up by `bun run dev` (via mprocs) or standalone with `bun run dev:infra`.
name: aluverse-dev

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: aluverse
    ports:
      - "5434:5432"
    volumes:
      - aluverse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aluverse"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aluverse_pgdata:
